name: Build Docker Image
on:
    workflow_call:
        inputs:
            php-version:
              description: 'PHP Version'
              type: string
              default: '8.2'
            php-extensions:
              description: 'PHP extensions to install'
              type: string
              default: ''
            use-bun:
              description: 'Enables the usage of Bun as package manager'
              type: boolean
              default: true
            bun-version:
              description: 'Bun version to install'
              type: string
              default: 'latest'
        secrets:
            ghToken:
              required: true
jobs:
    run:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repository
          uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

        - name: Login into Github Docker Registery
          run: echo "${{ secrets.ghToken }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

        - name: Install Shopware-CLI
          uses: shopware/shopware-cli-action@v3

        - name: Install Bun
          uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
          if: inputs.use-bun == true
          with:
            bun-version: ${{ inputs.bun-version }}
        
        - name: Setup PHP
          uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
          with:
            php-version: '${{ inputs.php-version }}'
            extensions: ${{ inputs.php-extensions }}
        
        - name: Get Composer Cache Directory
          id: composer-cache
          run: |
            echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

        - name: Cache Composer
          id: composer
          uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
          with:
            path: ${{ steps.composer-cache.outputs.dir }}
            key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

        - name: Set composer vars
          run: |
            echo "COMPOSER_DISABLE_NETWORK=${{ steps.composer.outputs.cache-hit && '1' || '0'  }}" >> "$GITHUB_ENV"
            echo "COMPOSER_NO_AUDIT=1" >> "$GITHUB_ENV"
            echo "COMPOSER_FUND=0" >> "$GITHUB_ENV"
            echo "COMPOSER_ROOT_VERSION=1.0.0" >> "$GITHUB_ENV"

        - name: Build project
          run: shopware-cli project ci .

        - name: Sanitize repository name
          id: sanitize
          run: |
            echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
            echo "repo=${GITHUB_REPOSITORY_NAME,,}" >> $GITHUB_OUTPUT
          env:
            GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
            GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}

        - name: Build and push
          uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
          with:
            context: .
            file: ./docker/Dockerfile
            push: true
            tags: ghcr.io/${{ steps.sanitize.outputs.owner }}/${{ steps.sanitize.outputs.repo }}:latest
